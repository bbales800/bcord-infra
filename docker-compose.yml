version: "3.9"
name: bcord

services:
  # ---- Backend (C++ BCord server) ----
  bcord:
    build:
      context: /srv/bcord/app
      dockerfile: Dockerfile
    image: bcord-backend:local
    container_name: bcord-backend
    restart: unless-stopped
    environment:
      PORT: "9000"
      BIND_ADDR: "0.0.0.0"
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: bcord
      PGUSER: bcord
      PGPASSWORD: change_me
      REDIS_URL: redis://redis:6379
      APP_NAME: BCord
      APP_VERSION: "1.0.0"
      BUILD_TIME: "2025-09-16T00:00:00Z"
    depends_on: [postgres, redis]
    networks: [net]
    ports:
      - "9100:9000"

  # ---- Caddy reverse proxy ----
  caddy:
    build:
      context: /srv/bcord/caddy
      dockerfile: Dockerfile
    image: bcord-caddy:local
    container_name: bcord-caddy
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/config.json", "--adapter", "json"]
    depends_on:
      - bcord
      - grafana
      - prometheus
    environment:
      CADDY_EMAIL: admin@b-cord.run.place
      CADDY_ACME_CA: https://acme.zerossl.com/v2/DV90
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - /srv/bcord/config.json:/etc/caddy/config.json:ro
      - /srv/bcord/site:/srv/bcord/site:ro
      - /srv/bcord/data:/data
      - /srv/bcord/config:/config
    networks:
      - net

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16
    container_name: bcord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bcord
      POSTGRES_USER: bcord
      POSTGRES_PASSWORD: change_me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcord -d bcord"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [net]

  # ---- Redis ----
  redis:
    image: redis:7
    container_name: bcord-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [net]

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: bcord-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=StrongPass123!
      - GF_SERVER_ROOT_URL=https://grafana.b-cord.run.place
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [net]
    expose:
      - "3000"

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: bcord-prometheus
    restart: unless-stopped
    volumes:
      - /srv/bcord/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [net]
    expose:
      - "9090"

  # ---- Watchtower (auto-updater) ----
  watchtower:
    image: containrrr/watchtower
    container_name: bcord-watchtower
    restart: unless-stopped
    command: --cleanup --interval 86400
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [net]

volumes:
  pgdata:
  grafana_data:
  prometheus_data:

networks:
  net:
    driver: bridge

